<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texas SPED Funding Intelligence</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

    function SpedFundingDashboard() {
      const data = [
        { name: 'Mainstream', amount: 4500 },
        { name: 'Resource', amount: 12000 },
        { name: 'Self-Contained', amount: 18000 }
      ];

      return (
        <div className="max-w-4xl mx-auto p-10 bg-white shadow-xl rounded-xl mt-10">
          <h1 className="text-3xl font-bold text-blue-900 mb-2">Texas SPED Funding Intelligence</h1>
          <p className="text-gray-600 mb-8 border-b pb-4">Status: <span className="text-green-600 font-bold">LIVE & ACTIVE</span></p>
          
          <div className="h-64 w-full">
            <ResponsiveContainer>
              <BarChart data={data}>
                <CartesianGrid strokeDasharray="3 3" />
                <XAxis dataKey="name" />
                <YAxis />
                <Tooltip />
                <Bar dataKey="amount" fill="#1e3a8a" />
              </BarChart>
            </ResponsiveContainer>
          </div>
          
          <div className="mt-8 p-4 bg-blue-50 rounded-lg border border-blue-200">
            <p className="text-blue-800 text-sm italic">Note: Replace this sample data with your specific TEA formulas once you confirm the site is visible.</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<SpedFundingDashboard />);
  </script>
</body>
</html>
