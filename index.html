<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas SPED Funding Intelligence</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background-color: #f5f5f7; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); }
        .apple-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, AreaChart, Area } = Recharts;

        const SpedIntelligenceApp = () => {
            const [enrollment, setEnrollment] = useState(1250);
            const [students, setStudents] = useState([
                { id: 1, name: "Sample Student A", tier: 3, fiie: true },
                { id: 2, name: "Sample Student B", tier: 1, fiie: false }
            ]);

            // Full TEA Fiscal Logic
            const calculations = useMemo(() => {
                const tierWeights = [1.15, 3.00, 6.00]; // Factor A, B, C
                const basicAllotment = 6160;
                
                const revenueByTier = students.reduce((acc, s) => {
                    const weight = tierWeights[s.tier - 1] || 1.15;
                    acc[s.tier] = (acc[s.tier] || 0) + (weight * basicAllotment);
                    return acc;
                }, {});

                const fiieTotal = students.filter(s => s.fiie).length * 1000;
                const totalRev = Object.values(revenueByTier).reduce((a, b) => a + b, 0) + fiieTotal;

                return { totalRev, fiieTotal, revenueByTier };
            }, [students]);

            const chartData = [
                { name: 'Tier 1', value: calculations.revenueByTier[1] || 0 },
                { name: 'Tier 2', value: calculations.revenueByTier[2] || 0 },
                { name: 'Tier 3', value: calculations.revenueByTier[3] || 0 },
                { name: 'FIIE', value: calculations.fiieTotal }
            ];

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-10 space-y-8">
                    {/* Apple Style Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center bg-white p-8 rounded-[32px] apple-shadow border border-gray-100">
                        <div>
                            <h1 className="text-4xl font-extrabold tracking-tight text-black">Funding Intelligence</h1>
                            <p className="text-sm font-semibold text-blue-600 uppercase tracking-[0.2em] mt-1">Texas IOS Dashboard</p>
                        </div>
                        <div className="flex items-center gap-6 mt-4 md:mt-0">
                            <div className="text-right">
                                <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">District ADA</label>
                                <input 
                                    type="number" 
                                    value={enrollment} 
                                    onChange={(e) => setEnrollment(e.target.value)}
                                    className="bg-gray-50 border-none rounded-xl px-4 py-2 font-bold text-gray-900 w-24 text-center focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                        </div>
                    </header>

                    {/* KPI Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="glass-card p-8 apple-shadow border-t-4 border-blue-500">
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Total Estimated Revenue</p>
                            <h2 className="text-5xl font-bold">${calculations.totalRev.toLocaleString()}</h2>
                        </div>
                        <div className="glass-card p-8 apple-shadow border-t-4 border-green-500">
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">FIIE Allotment (§48.159)</p>
                            <h2 className="text-5xl font-bold text-green-600">${calculations.fiieTotal.toLocaleString()}</h2>
                        </div>
                        <div className="glass-card p-8 apple-shadow border-t-4 border-slate-900">
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Rev Per Student (ADA)</p>
                            <h2 className="text-5xl font-bold text-gray-400">${enrollment > 0 ? Math.round(calculations.totalRev / enrollment).toLocaleString() : 0}</h2>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Roster Input Panel */}
                        <div className="lg:col-span-5 glass-card p-8 apple-shadow">
                            <h3 className="text-xl font-bold mb-6 italic">Add Student to IOS Roster</h3>
                            <div className="space-y-5">
                                <input id="n" placeholder="Student Name / ID" className="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 font-bold" />
                                <div className="grid grid-cols-2 gap-4">
                                    <select id="t" className="p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 font-bold">
                                        <option value="1">Tier 1 (1.15x)</option>
                                        <option value="2">Tier 2 (3.00x)</option>
                                        <option value="3">Tier 3 (6.00x)</option>
                                    </select>
                                    <div className="flex items-center gap-3 bg-green-50 p-4 rounded-2xl ring-1 ring-green-100">
                                        <input type="checkbox" id="f" className="w-5 h-5 accent-green-600" />
                                        <label className="text-[10px] font-bold text-green-700 uppercase">FIIE Eval</label>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => {
                                        const n = document.getElementById('n').value;
                                        const t = document.getElementById('t').value;
                                        const f = document.getElementById('f').checked;
                                        if(!n) return;
                                        setStudents([...students, { id: Date.now(), name: n, tier: parseInt(t), fiie: f }]);
                                        document.getElementById('n').value = '';
                                    }}
                                    className="w-full py-5 bg-black text-white rounded-[20px] font-bold hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-gray-200"
                                >
                                    Commit to Dashboard
                                </button>
                            </div>
                        </div>

                        {/* Chart Panel */}
                        <div className="lg:col-span-7 glass-card p-8 apple-shadow h-[500px]">
                            <h3 className="text-xl font-bold mb-8">Revenue Distribution</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={chartData}>
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 12, fontWeight: 700}} />
                                    <Tooltip cursor={{fill: 'transparent'}} contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 30px rgba(0,0,0,0.1)'}} />
                                    <Bar dataKey="value" radius={[10, 10, 10, 10]} barSize={60}>
                                        {chartData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={index === 3 ? '#22c55e' : '#3b82f6'} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<SpedIntelligenceApp />);
    </script>
</body>
</html>
