<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas SPED Funding Intelligence</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background-color: #f5f5f7; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, LineChart, Line } = Recharts;

        // --- FULL DASHBOARD COMPONENT ---
        function SpedDashboard() {
            const [activeTab, setActiveTab] = useState("roster");
            const [students, setStudents] = useState([]);
            const [enrollment, setEnrollment] = useState(1200);

            // --- REVENUE LOGIC ---
            const stats = useMemo(() => {
                const tierRates = [800, 950, 1100, 1300, 1600, 2000, 2600, 3500];
                const tierRev = students.reduce((sum, s) => sum + (tierRates[s.tier - 1] || 0), 0);
                const fiieRev = students.filter(s => s.fiie).length * 1000;
                return { total: tierRev + fiieRev, fiie: fiieRev, fte: (tierRev / 6160).toFixed(1) };
            }, [students]);

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
                    {/* Header */}
                    <header className="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tight text-gray-900">Funding Intelligence</h1>
                            <p className="text-sm font-medium text-blue-600 uppercase tracking-widest">Texas IOS Dashboard</p>
                        </div>
                        <div className="text-right px-4 border-l">
                            <label className="block text-[10px] font-bold text-gray-400 uppercase">ADA Enrollment</label>
                            <input type="number" value={enrollment} onChange={(e) => setEnrollment(e.target.value)} className="w-20 font-bold text-blue-600 outline-none text-xl text-right" />
                        </div>
                    </header>

                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="glass-card p-8 border-t-4 border-blue-500">
                            <p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Total Revenue</p>
                            <h2 className="text-4xl font-bold text-gray-900">${stats.total.toLocaleString()}</h2>
                        </div>
                        <div className="glass-card p-8 border-t-4 border-green-500">
                            <p className="text-[10px] font-bold text-gray-400 uppercase mb-1">FIIE Allotment</p>
                            <h2 className="text-4xl font-bold text-green-600">${stats.fiie.toLocaleString()}</h2>
                        </div>
                        <div className="glass-card p-8 border-t-4 border-slate-400">
                            <p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Avg / Student</p>
                            <h2 className="text-4xl font-bold text-blue-500">${enrollment > 0 ? Math.round(stats.total / enrollment).toLocaleString() : 0}</h2>
                        </div>
                    </div>

                    {/* Main Interface */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 glass-card p-8 space-y-6">
                            <h3 className="text-lg font-bold">4-Factor Input</h3>
                            <div className="space-y-4">
                                <input id="sName" placeholder="Student Name" className="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-100 focus:ring-2 focus:ring-blue-500 font-bold" />
                                <select id="sTier" className="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-100 font-bold">
                                    <option value="1">Tier 1 (1.15x)</option>
                                    <option value="2">Tier 2 (3.00x)</option>
                                    <option value="3">Tier 3 (6.00x)</option>
                                </select>
                                <div className="flex items-center gap-2 p-2 bg-green-50 rounded-xl">
                                    <input type="checkbox" id="sFiie" className="w-5 h-5 accent-green-600" />
                                    <label className="text-xs font-bold text-green-700">Include FIIE ($1,000)</label>
                                </div>
                                <button onClick={() => {
                                    const name = document.getElementById('sName').value;
                                    const tier = document.getElementById('sTier').value;
                                    const fiie = document.getElementById('sFiie').checked;
                                    setStudents([...students, { name, tier, fiie }]);
                                }} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg">Add Student</button>
                            </div>
                        </div>

                        <div className="lg:col-span-8 glass-card p-8 min-h-[500px]">
                            <h3 className="text-xl font-bold mb-6">Service Group Roster</h3>
                            <div className="overflow-hidden rounded-xl border border-gray-100">
                                <table className="w-full text-left">
                                    <thead className="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase">
                                        <tr>
                                            <th className="p-4">Name</th>
                                            <th className="p-4">Tier</th>
                                            <th className="p-4">FIIE</th>
                                            <th className="p-4 text-right">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-50">
                                        {students.map((s, i) => (
                                            <tr key={i} className="hover:bg-blue-50/30 transition-all">
                                                <td className="p-4 font-bold">{s.name || "Student"}</td>
                                                <td className="p-4"><span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold">TIER {s.tier}</span></td>
                                                <td className="p-4 text-green-600 font-bold">{s.fiie ? "✓ $1k" : "—"}</td>
                                                <td className="p-4 text-right"><button className="text-red-300 hover:text-red-500 font-bold">×</button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {students.length === 0 && <div className="py-20 text-center text-gray-300 font-medium italic text-sm">Add students to build the fiscal roster</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<SpedDashboard />);
    </script>
</body>
</html>
